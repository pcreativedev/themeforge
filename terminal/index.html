<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ThemeForge Terminal</title>
  <link rel="stylesheet" href="/xterm.css">
  <style>
    html, body { margin:0; padding:0; height:100%; background:#0c0c0d; overflow:hidden; }
    #term { position:absolute; inset:0; padding:6px; }
    .status { position:absolute; bottom:0; right:6px; color:#666; font:11px monospace; pointer-events:none; }
    /* Scrollbar del viewport de xterm: en WebEngine (Chromium) el scrollbar
       por defecto es invisible/overlay y el FitAddon lo tapa. Lo hacemos
       visible y siempre presente (reserva ancho) para poder hacer scroll
       en el scrollback con rueda o arrastrando. */
    .xterm .xterm-viewport { overflow-y: scroll !important; }
    .xterm-viewport::-webkit-scrollbar { width: 12px; }
    .xterm-viewport::-webkit-scrollbar-track { background: #0c0c0d; }
    .xterm-viewport::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 6px; border: 3px solid #0c0c0d; }
    .xterm-viewport::-webkit-scrollbar-thumb:hover { background: #565656; }
  </style>
</head>
<body>
  <div id="term"></div>
  <div class="status" id="status">conectando…</div>

  <script src="/xterm.js"></script>
  <script src="/addon-fit.js"></script>
  <script src="/qwebchannel.js"></script>
  <script>
    // Puente de portapapeles Qt (copiar/pegar fiable, sin depender del clipboard
    // de Chromium). window.tfClip queda disponible cuando el canal conecta.
    window.__clipState = "QWebChannel=" + (!!window.QWebChannel)
                       + " transport=" + !!(window.qt && window.qt.webChannelTransport);
    try {
      if (window.QWebChannel && window.qt && qt.webChannelTransport) {
        new QWebChannel(qt.webChannelTransport, function (ch) {
          window.tfClip = ch.objects.tfClip;
          window.__clipState = "puente Qt ✓";
          var s = document.getElementById('status'); if (s) s.textContent = 'clip: puente Qt ✓';
        });
      }
    } catch (e) { window.__clipState = "err:" + e; }
  </script>
  <script>
    const params = new URLSearchParams(location.search);
    const status = document.getElementById('status');

    const term = new Terminal({
      fontFamily: '"Fira Code", "DejaVu Sans Mono", monospace',
      fontSize: 13,
      cursorBlink: true,
      allowProposedApi: true,
      scrollback: 5000,
      theme: {
        background:    '#0c0c0d',
        foreground:    '#e6e6e6',
        cursor:        '#e6e6e6',
        selectionBackground: '#3a3a3a',
        black:   '#222', red:     '#ed1c57',
        green:   '#50fa7b', yellow:  '#ffe44d',
        blue:    '#62b4ff', magenta: '#cc7cff',
        cyan:    '#8be9fd', white:   '#e8e8eb',
      },
    });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(document.getElementById('term'));
    fit.fit();

    const wsHost = location.host;
    const ws = new WebSocket(`ws://${wsHost}/?${params}`);

    ws.onopen = () => {
      status.textContent = 'conectado';
      sendResize();
    };
    ws.onclose = () => { status.textContent = 'desconectado'; };
    ws.onerror = () => { status.textContent = 'error WebSocket'; };
    ws.onmessage = e => {
      // Texto crudo del pty
      if (typeof e.data === 'string') term.write(e.data);
      else e.data.text().then(t => term.write(t));
    };

    term.onData(d => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type: 'input', data: d}));
      }
    });

    function sendResize() {
      fit.fit();
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type: 'resize', cols: term.cols, rows: term.rows}));
      }
    }
    let rt;
    window.addEventListener('resize', () => {
      clearTimeout(rt);
      rt = setTimeout(sendResize, 60);
    });

    // Foco al iniciar
    term.focus();

    // ─── Copiar / pegar (estilo terminal) ───────────────────────────────
    // execCommand('copy') con un textarea es lo MÁS fiable en QWebEngine
    // (navigator.clipboard suele bloquearse). Probamos ese primero.
    function _copy(text) {
      if (!text) return;
      // 1) Puente Qt (lo más fiable). 2) execCommand. 3) navigator.clipboard.
      if (window.tfClip && window.tfClip.copy) {
        try { window.tfClip.copy(text); _flash('copiado (qt) ✓'); term.focus(); return; } catch (e) {}
      }
      let ok = false;
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed'; ta.style.left = '-9999px'; ta.style.top = '0';
        document.body.appendChild(ta); ta.focus(); ta.select();
        ta.setSelectionRange(0, text.length);
        ok = document.execCommand('copy');
        document.body.removeChild(ta);
      } catch (e) { ok = false; }
      if (ok) { _flash('copiado (exec) ✓'); term.focus(); return; }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        try { navigator.clipboard.writeText(text); _flash('copiado (api) ✓'); }
        catch (e) { _flash('NO copia [' + (window.__clipState || '?') + ']'); }
      } else { _flash('NO copia [' + (window.__clipState || '?') + ']'); }
      term.focus();
    }
    function _paste() {
      const send = t => { if (t && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'input', data: t })); };
      if (window.tfClip && window.tfClip.paste) {
        try { window.tfClip.paste(send); return; } catch (e) {}
      }
      if (navigator.clipboard && navigator.clipboard.readText) {
        navigator.clipboard.readText().then(send).catch(() => {});
      }
    }
    function _flash(msg) {
      const prev = status.textContent; status.textContent = msg;
      setTimeout(() => { status.textContent = prev; }, 900);
    }
    // Copiar AL SELECCIONAR y AL SOLTAR el ratón (doble red por si uno no dispara).
    term.onSelectionChange(() => {
      const sel = term.getSelection();
      if (sel && sel.trim()) _copy(sel);
    });
    document.getElementById('term').addEventListener('mouseup', () => {
      const sel = term.getSelection();
      if (sel && sel.trim()) _copy(sel);
    });
    // Clic derecho: con selección → copia; sin selección → pega.
    document.getElementById('term').addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const sel = term.getSelection();
      if (sel && sel.trim()) { _copy(sel); }
      else { _paste(); }
    });
    // Atajos: Ctrl+Shift+C copiar · Ctrl+Shift+V pegar
    term.attachCustomKeyEventHandler((ev) => {
      if (ev.type !== 'keydown' || !ev.ctrlKey || !ev.shiftKey) return true;
      const k = (ev.key || '').toLowerCase();
      if (k === 'c') { const s = term.getSelection(); if (s) { _copy(s); _flash('copiado ✓'); } return false; }
      if (k === 'v') { _paste(); return false; }
      return true;
    });
  </script>
</body>
</html>
