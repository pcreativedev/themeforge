<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pcreative Studio ♡ Kawaii</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Mochiy+Pop+One&family=Kosugi+Maru&display=swap" rel="stylesheet" />
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#ffd9ec" />
    <text x="50" y="64" font-size="44" text-anchor="middle">🌸</text>
  </svg>
</template>
<style>
  :root {
    --p1:#ff8fc7; --p2:#b9a3ff; --p3:#8fe3c9; --p4:#ffd36e;
    --accent:var(--p1); --accent2:var(--p2);
    --bg:#fff5fa; --bg2:#ffeaf4; --side:#ffffff; --card:#ffffff;
    --tx:#6b4a5e; --tx-dim:#b98fa8; --line:#ffd9ec;
    --shadow:0 10px 26px -12px rgba(255,143,199,0.45);
    --font:'Baloo 2',system-ui,sans-serif;
    --cute:'Mochiy Pop One','Baloo 2',sans-serif;
    --jp:'Kosugi Maru',sans-serif;
    --sparkle:1;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(circle at 14% 6%,rgba(185,163,255,0.16),transparent 36%),
      radial-gradient(circle at 90% 4%,rgba(143,227,201,0.16),transparent 34%),
      var(--bg);
    color:var(--tx); font-family:var(--font);
    -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  body.dark{--bg:#2a1f2e;--bg2:#382838;--side:#33253a;--card:#3a2c3e;--tx:#ffe5f2;--tx-dim:#c99bb8;--line:#523a52;--shadow:0 10px 26px -12px rgba(0,0,0,0.5);}
  ::selection{background:var(--accent);color:#fff;}
  ::-webkit-scrollbar{width:11px;height:11px;}
  ::-webkit-scrollbar-thumb{background:var(--accent);border-radius:99px;border:3px solid var(--bg);}
  button{font-family:var(--font);}

  .app{display:flex;height:100vh;position:relative;z-index:2;}

  /* sidebar */
  .side{width:210px;flex-shrink:0;background:var(--side);border-right:3px solid var(--line);display:flex;flex-direction:column;padding:20px 14px;box-shadow:8px 0 24px -16px rgba(255,143,199,0.4);z-index:3;}
  .brand{font-family:var(--cute);font-size:20px;color:var(--accent);display:flex;align-items:center;gap:8px;text-shadow:1.5px 1.5px 0 #fff,2.5px 2.5px 0 var(--line);margin-bottom:4px;}
  .brand small{display:block;font-family:var(--jp);font-size:10.5px;color:var(--tx-dim);text-shadow:none;font-weight:400;margin-top:2px;}
  .nav{display:flex;flex-direction:column;gap:5px;margin-top:22px;flex:1;}
  .navi{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:16px;cursor:pointer;border:2px solid transparent;background:transparent;color:var(--tx-dim);font-size:14.5px;font-weight:600;transition:all .16s;text-align:left;}
  .navi:hover{background:var(--bg2);color:var(--tx);}
  .navi.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:var(--shadow);}
  .navi .ico{font-size:18px;width:22px;text-align:center;}
  .navi .jp{margin-left:auto;font-family:var(--jp);font-size:10px;opacity:.7;}
  .agents{border-top:2px dashed var(--line);padding-top:14px;margin-top:8px;}
  .agents .lbl{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx-dim);font-weight:700;margin-bottom:8px;}
  .agrow{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0;}
  .agrow .em{font-size:14px;}
  .dot{width:8px;height:8px;border-radius:99px;margin-left:auto;}

  /* main */
  .main{flex:1;overflow-y:auto;}
  .bar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:14px;padding:18px 30px;background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(8px);border-bottom:2px solid var(--line);}
  .h1{font-family:var(--cute);font-size:25px;color:var(--tx);margin:0;flex-shrink:0;}
  .search{flex:1;max-width:340px;display:flex;align-items:center;gap:8px;background:var(--card);border:2px solid var(--line);border-radius:99px;padding:9px 16px;box-shadow:var(--shadow);}
  .search input{border:none;background:none;outline:none;font-family:var(--font);font-size:14px;color:var(--tx);width:100%;}
  .btn{background:var(--card);border:2px solid var(--line);border-radius:99px;padding:9px 17px;font-weight:700;font-size:14px;color:var(--tx);cursor:pointer;box-shadow:var(--shadow);transition:all .16s;display:inline-flex;align-items:center;gap:7px;}
  .btn:hover{transform:translateY(-2px);border-color:var(--accent);color:var(--accent);}
  .btn.pri{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;}
  .btn.pri:hover{color:#fff;filter:brightness(1.04);}

  .page{padding:26px 30px 70px;}

  /* stats */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px;}
  .stat{background:var(--card);border:3px solid var(--line);border-radius:22px;padding:16px 18px;box-shadow:var(--shadow);transition:transform .18s;}
  .stat:hover{transform:translateY(-3px) rotate(-1deg);}
  .stat .em{font-size:24px;}
  .stat .n{font-family:var(--cute);font-size:25px;color:var(--accent);margin-top:2px;}
  .stat .l{font-size:12.5px;color:var(--tx-dim);font-weight:600;}

  .sec{font-family:var(--cute);font-size:21px;margin:0 0 16px;display:flex;align-items:center;gap:9px;}
  .filters{display:flex;gap:7px;margin-bottom:20px;flex-wrap:wrap;}
  .fchip{background:var(--card);border:2px solid var(--line);border-radius:99px;padding:6px 15px;font-size:13px;font-weight:600;color:var(--tx-dim);cursor:pointer;transition:all .15s;}
  .fchip:hover{color:var(--tx);}
  .fchip.on{background:var(--accent);color:#fff;border-color:var(--accent);}

  /* gallery cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px;}
  .pcard{background:var(--card);border:3px solid var(--line);border-radius:26px;padding:9px;box-shadow:var(--shadow);transition:all .2s;position:relative;}
  .pcard:hover{transform:translateY(-5px);border-color:var(--accent);}
  .pcover{width:100%;height:160px;display:block;}
  .pstatus{position:absolute;top:18px;left:18px;background:var(--card);border-radius:99px;padding:4px 11px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;box-shadow:var(--shadow);z-index:3;}
  .pjp{position:absolute;top:16px;right:16px;font-family:var(--jp);font-size:13px;color:#fff;background:rgba(0,0,0,.18);padding:3px 9px;border-radius:99px;z-index:3;}
  .pbody{padding:12px 11px 8px;}
  .prow{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .prow>div:first-child{min-width:0;}
  .pname{font-weight:800;font-size:17px;color:var(--tx);line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ptype{font-size:12.5px;color:var(--tx-dim);font-weight:600;margin-top:3px;}
  .pcost{font-family:var(--cute);font-size:14px;color:var(--accent);flex-shrink:0;}
  .ptags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .tag{background:var(--bg2);color:var(--tx-dim);font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;}
  .pfoot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:11px;border-top:2px dashed var(--line);font-size:12px;}
  .pagent{display:flex;align-items:center;gap:6px;font-weight:700;}
  .pfav{position:absolute;bottom:74px;right:18px;width:34px;height:34px;border-radius:99px;background:var(--card);display:grid;place-items:center;font-size:17px;box-shadow:var(--shadow);cursor:pointer;z-index:3;transition:transform .15s;}
  .pfav:hover{transform:scale(1.2) rotate(10deg);}

  /* generic mascot card / vibe / cost reuse */
  .panelc{background:var(--card);border:3px solid var(--line);border-radius:26px;padding:22px;box-shadow:var(--shadow);}
  .ta{width:100%;min-height:90px;resize:vertical;background:var(--bg2);border:2px solid var(--line);border-radius:18px;padding:14px;font-family:var(--font);font-size:14px;color:var(--tx);outline:none;}
  .ta:focus{border-color:var(--accent);}
  .tile{background:var(--bg2);border:2px solid var(--line);border-radius:18px;padding:13px 14px;cursor:pointer;text-align:left;transition:all .15s;}
  .tile.on{background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 22%,var(--card)),color-mix(in srgb,var(--accent2) 22%,var(--card)));border-color:var(--accent);}
  .tile:hover{transform:translateY(-2px);}

  /* donut + bars */
  .bar2{height:11px;background:var(--bg2);border-radius:99px;overflow:hidden;}
  .bar2>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));}

  /* sparkles */
  .sparkles{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;opacity:var(--sparkle);}
  .sp{position:absolute;animation:floaty linear infinite;opacity:0;}
  @keyframes floaty{0%{transform:translateY(105vh) scale(.6) rotate(0);opacity:0;}10%{opacity:.85;}90%{opacity:.85;}100%{transform:translateY(-10vh) scale(1.1) rotate(220deg);opacity:0;}}
  .heart-burst{position:fixed;pointer-events:none;font-size:24px;z-index:60;animation:burst .9s ease-out forwards;}
  @keyframes burst{0%{transform:translateY(0) scale(.5);opacity:1;}100%{transform:translateY(-70px) scale(1.4);opacity:0;}}
  .fade{animation:fin .35s ease;}
  @keyframes fin{from{transform:translateY(10px);}to{transform:none;}}

  @media(max-width:820px){.side{display:none;}.stats{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="sparkles" id="sparkles"></div>
<div id="root"></div>

<script src="image-slot.js"></script>
