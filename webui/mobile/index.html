<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0b0e14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>ThemeForge — Móvil</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root{
      --bg:#0b0e14; --panel:#141925; --panel2:#1b2233; --line:#26304a;
      --tx:#e8edf7; --dim:#9fb0cc; --faint:#5e6c87;
      --accent:#3ddc97; --accent2:#5b8cff; --hot:#ff5db1; --warn:#ffb000; --bad:#ff5577;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
    html,body{margin:0; height:100%; background:var(--bg); color:var(--tx);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; overscroll-behavior:none;}
    #root{height:100%;}
    input,select,textarea,button{font-family:inherit; font-size:16px;}
    button{cursor:pointer;}
    .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;}
    ::-webkit-scrollbar{width:0;height:0;}
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Carga la config remota (base+token) ANTES del shim del bridge -->
  <script>
    try {
      var c = JSON.parse(localStorage.getItem('tf_remote') || 'null');
      if (c && c.base) window.TF_REMOTE = c;
    } catch (e) {}
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <!-- Reimplementa window.tfBridge sobre el API Gateway remoto -->
  <script src="../remote/tfbridge-remote.js"></script>
  <!-- Pantallas opcionales (plugin privado; ausente en OSS) — antes de app.jsx -->
  <script type="text/babel" src="app-private.jsx"></script>
  <!-- App móvil -->
  <script type="text/babel" src="app.jsx"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
