name: Build macOS .app

# Builds a macOS .app bundle of Pcreative Studio using PyInstaller on a
# GitHub-hosted macos-latest runner. The .app is uploaded as a
# workflow artifact; when triggered by a `v*` tag, it's also attached
# to a GitHub Release.
#
# The .app is NOT code-signed. macOS Gatekeeper will block first-run
# until the user does `Cmd+click → Open` once. Adding code-signing
# requires an Apple Developer ID ($99/year) — tracked in ROADMAP.
#
# Triggers:
#   - manual via "Run workflow" button (workflow_dispatch)
#   - on push of a tag matching v*  (creates a draft release)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write  # for the Release upload on tag push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '.github/workflows/build-macos.yml') }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyqt6 pyqt6-webengine pyqt6-charts pyinstaller

      - name: Generate .icns from PNG sources
        run: |
          set -e
          mkdir -p icon.iconset
          # macOS expects the following filenames (Apple HIG):
          cp assets/pcreative-studio-16.png  icon.iconset/icon_16x16.png
          cp assets/pcreative-studio-32.png  icon.iconset/icon_16x16@2x.png
          cp assets/pcreative-studio-32.png  icon.iconset/icon_32x32.png
          cp assets/pcreative-studio-64.png  icon.iconset/icon_32x32@2x.png
          cp assets/pcreative-studio-128.png icon.iconset/icon_128x128.png
          cp assets/pcreative-studio-256.png icon.iconset/icon_128x128@2x.png
          cp assets/pcreative-studio-256.png icon.iconset/icon_256x256.png
          # Fall back to the full-res source for 512+ slots
          cp assets/pcreative-studio.png     icon.iconset/icon_256x256@2x.png
          cp assets/pcreative-studio.png     icon.iconset/icon_512x512.png
          cp assets/pcreative-studio.png     icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o assets/pcreative-studio.icns
          echo "✓ generated assets/pcreative-studio.icns"
          ls -la assets/pcreative-studio.icns

      - name: Build .app with PyInstaller
        run: |
          set -e
          # --windowed: no terminal window on launch
          # --osx-bundle-identifier: required for proper Mac integration
          # --add-data: bundle non-Python resources
          # We use shellscript bundling so the spec is simple to read
          # --collect-data PyQt6: bundles Qt plugins including the
          # QtMultimedia backend (AVFoundation) needed for the video splash.
          pyinstaller --noconfirm --clean \
            --windowed \
            --name Pcreative Studio \
            --icon assets/pcreative-studio.icns \
            --osx-bundle-identifier dev.pcreative.pcreative-studio \
            --add-data "assets:assets" \
            --add-data "context:context" \
            --add-data "themes/presets:themes/presets" \
            --collect-submodules PyQt6 \
            --collect-data PyQt6 \
            --hidden-import video_splash \
            --hidden-import dependency_setup \
            --hidden-import dependency_wizard \
            pcreative_studio.py
          ls -la dist/

      - name: Zip the .app for distribution
        run: |
          cd dist
          zip -r --symlinks Pcreative Studio-macOS.zip Pcreative Studio.app
          ls -la Pcreative Studio-macOS.zip

      - name: Upload .app as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pcreative Studio-macOS
          path: dist/Pcreative Studio-macOS.zip
          retention-days: 30

      - name: Attach to GitHub Release (only on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Pcreative Studio-macOS.zip
          draft: true
          generate_release_notes: true
